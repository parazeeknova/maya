<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maya Camera View</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="stage">
      <video id="camera-feed" autoplay muted playsinline></video>
      <canvas id="overlay-canvas"></canvas>
      <canvas id="capture-canvas" hidden></canvas>

      <details id="menu-shell" class="menu-shell">
        <summary id="menu-toggle" class="menu-button">≡</summary>

        <section id="options-panel" class="options-panel">
          <div class="option-row">
            <span class="option-label">Connection</span>
            <strong id="connection-value">offline</strong>
          </div>

          <div class="option-row">
            <span class="option-label">Frames</span>
            <strong id="frame-counter">0 frames</strong>
          </div>

          <div class="option-row">
            <span class="option-label">Latency</span>
            <strong id="latency-chip">0 ms</strong>
          </div>

          <label class="option-group slider-group">
            <span class="option-label">Sampling interval</span>
            <input
              id="interval-input"
              type="range"
              min="120"
              max="500"
              value="180"
              step="10"
            />
            <strong id="interval-value">180 ms</strong>
          </label>

          <label class="option-group slider-group">
            <span class="option-label">JPEG quality</span>
            <input
              id="quality-input"
              type="range"
              min="40"
              max="95"
              value="68"
              step="1"
            />
            <strong id="quality-value">0.68</strong>
          </label>

          <div class="option-row">
            <span class="option-label">Providers</span>
            <strong id="providers-value">pending</strong>
          </div>

          <div class="option-row">
            <span class="option-label">Tracking</span>
            <strong id="tracking-value">pending</strong>
          </div>

          <div class="option-row">
            <span class="option-label">Enrollment</span>
            <strong id="enrollment-value">pending</strong>
          </div>

          <div class="option-row">
            <span class="option-label">Index version</span>
            <strong id="index-value">pending</strong>
          </div>
        </section>
      </details>
    </main>

    <script type="module" src="/client.js"></script>
  </body>
</html>
